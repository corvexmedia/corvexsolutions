<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corvex Solutions</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f9fafb;
            color: #333;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
            max-width: 500px;
            text-align: center;
        }
        h1 { margin-top: 0; color: #111; }
        p { line-height: 1.6; color: #555; margin-bottom: 30px; }
        .btn {
            display: inline-block;
            background-color: #0066cc;
            color: white;
            padding: 12px 24px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: 500;
            transition: background-color 0.2s;
        }
        .btn:hover { background-color: #0052a3; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Corvex Solutions</h1>
        <p>Corvex Solutions is a specialized division of Corvex Media focused on advanced B2B integrations and outreach technologies.</p>
        <a href="https://corvexmedia.com" class="btn">Visit Corvex Media</a>
    </div>
</body>
</html>
